schema_version: 1

context:
  name: glyphx
  version: "2.0.1"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/glyphx-${{ version }}.tar.gz
  sha256: e1e622528a37a1bed595e2388538a17562e85448d18306cb2969f1c0f163e67c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - numpy
    - ipython
    - ipywidgets
    - pandas
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.21
    - pandas >=1.4.2
    - scipy >=1.7
    - cairosvg >=2.5
    - ipython >=7.0
    - ipywidgets >=8.1

tests:
  - python:
      imports:
        - glyphx
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/kjkoeller/glyphx
  documentation: https://glyphx.readthedocs.io/
  summary: A next-gen Python plotting library with SVG-first rendering, interactivity, themes, and clean defaults.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
